include:
  - project: $CATALOG_PATH
    file:
      - vault-ci.yml
    ref: main

# default:
#  tags:
#    - ADD_CUSTOM_TAG_HERE

cache:
  paths:
    - node_modules

variables:
  TAG: "${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
  REGISTRY_URL: "${IMAGE_REPOSITORY}"

stages:
  - read-secret
  - build-images

read_secret:
  stage: read-secret
  extends:
    - .vault:read_secret

build-backend:
  variables:
    WORKING_DIR: "."
    DOCKERFILE: packages/backend/Dockerfile
    IMAGE_NAME: backend
  stage: build-images
  extends:
    - .kaniko:simple-build-push

build-frontend-usagers:
  variables:
    WORKING_DIR: "."
    DOCKERFILE: packages/frontend-usagers/Dockerfile
    IMAGE_NAME: frontend-usagers
  stage: build-images
  extends:
    - .kaniko:simple-build-push


.kaniko:simple-build-push:
  variables:
    DOCKERFILE: Dockerfile
    WORKING_DIR: .
    IMAGE_NAME: ""
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # CA
    - if [ ! -z $CA_BUNDLE ]; then cat $CA_BUNDLE >> /kaniko/ssl/certs/additional-ca-cert-bundle.crt; fi
    - mkdir -p /kaniko/.docker
    - echo "$DOCKER_AUTH" > /kaniko/.docker/config.json
    - /kaniko/executor --build-arg http_proxy=$http_proxy --build-arg https_proxy=$https_proxy --build-arg no_proxy=$no_proxy 
      --context="$CI_PROJECT_DIR/$WORKING_DIR"
      --dockerfile="$CI_PROJECT_DIR/$WORKING_DIR/$DOCKERFILE"
      --registry-mirror=nexus-docker-proxy.apps.c6.numerique-interieur.com 
      --destination $REGISTRY_URL/$IMAGE_NAME:$TAG

